version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: recipes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/recipes_db
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A app.workers.sync_worker worker --loglevel=info -Q social_sync,embeddings
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/recipes_db
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      - db
      - redis

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - api

volumes:
  postgres_data:
